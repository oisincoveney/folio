<div x-data="filePicker()" x-show="!$store.app.rows.length" class="flex h-full items-center justify-center">
  <input type="file" accept=".pdf" multiple x-ref="fileInput"
         @change="handleFileSelect($event)" class="hidden">
  <input type="file" webkitdirectory x-ref="folderInput"
         @change="handleFolderSelect($event)" class="hidden">

  <div @dragover.prevent="dragging=true"
       @dragleave.prevent="dragging=false"
       @drop.prevent="dragging=false; handleDrop($event)"
       :class="dragging ? 'border-gray-900 bg-white shadow-lg' : 'border-gray-300 bg-white shadow-sm'"
       class="w-full max-w-4xl rounded-lg border border-dashed p-6 transition-all sm:p-8">
    <div class="flex flex-col gap-5 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <p class="text-sm font-semibold text-gray-950">Drop PDFs or a folder</p>
        <p class="mt-1 max-w-xl text-sm text-gray-500">Single files, multiple files, and folders all use the same batch flow.</p>
      </div>

      <div class="flex items-center gap-2">
        <button @click="$refs.fileInput.click()"
                class="inline-flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 transition-colors hover:border-gray-900 hover:text-gray-900">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M7 18a4 4 0 01.88-7.9A5 5 0 1118.9 13H19a3 3 0 010 6H7z"/>
          </svg>
          Choose PDFs
        </button>
        <button @click="$refs.folderInput.click()"
                class="inline-flex items-center gap-2 rounded-lg bg-gray-900 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-gray-700">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 7a2 2 0 012-2h3l2 2h9a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
          </svg>
          Choose Folder
        </button>
      </div>
    </div>
  </div>
</div>
