<header x-data="header()" class="sticky top-0 z-30 border-b border-gray-200 bg-white/95 backdrop-blur">
  <div class="flex h-14 items-center justify-between gap-4 px-4 sm:px-6">
    <div class="flex min-w-0 items-center gap-3">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-gray-900 text-sm font-semibold text-white">
        f
      </div>
      <div class="min-w-0">
        <h1 class="text-base font-semibold leading-none text-gray-950">folio</h1>
        <div x-show="$store.app.rows.length" class="mt-1 flex items-center gap-2 text-xs text-gray-500">
          <span x-text="$store.app.total + ' files'"></span>
          <span class="h-1 w-1 rounded-full bg-gray-300"></span>
          <span x-text="$store.app.completed + ' parsed'"></span>
        </div>
      </div>
    </div>

    <div class="relative w-full max-w-md" @keydown.escape.window="open=false">
      <div class="flex items-center gap-2">
        <span class="hidden text-xs font-medium uppercase tracking-wide text-gray-400 sm:inline">Model</span>
        <button type="button"
                @click="if (!$store.app.parsing) { open=!open; $nextTick(() => $refs.modelSearch?.focus()) }"
                :disabled="$store.app.parsing"
                class="flex min-w-0 flex-1 items-center justify-between gap-3 rounded-lg border border-gray-300 bg-white px-3 py-2 text-left text-sm text-gray-800 shadow-sm transition-colors hover:border-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-900/15 disabled:cursor-not-allowed disabled:bg-gray-50 disabled:text-gray-400">
          <span class="truncate" x-text="selectedLabel()"></span>
          <svg class="h-4 w-4 shrink-0 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"/>
          </svg>
        </button>
        <button type="button"
                @click="loadModels()"
                :disabled="$store.app.parsing"
                class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg border border-gray-300 bg-white text-gray-500 transition-colors hover:border-gray-900 hover:text-gray-900 disabled:cursor-not-allowed disabled:bg-gray-50 disabled:text-gray-300"
                title="Refresh models">
          <svg class="h-4 w-4" :class="loading ? 'animate-spin' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 4v5h.58M20 20v-5h-.58M5.64 17A8 8 0 0018.36 7M18.36 7H14m4.36 0V3M18.36 7A8 8 0 005.64 17M5.64 17H10m-4.36 0v4"/>
          </svg>
        </button>
      </div>

      <div x-show="open"
           x-transition.origin.top.right
           @click.outside="open=false"
           class="absolute right-0 mt-2 w-full overflow-hidden rounded-lg border border-gray-200 bg-white shadow-xl">
        <div class="border-b border-gray-100 p-2">
          <input x-ref="modelSearch"
                 x-model="query"
                 placeholder="Search models"
                 class="w-full rounded-md border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900/15">
        </div>
        <div class="max-h-72 overflow-y-auto p-1">
          <template x-if="filteredPdfModels().length">
            <div>
              <div class="px-3 pb-1 pt-2 text-[11px] font-semibold uppercase tracking-wide text-gray-400">PDF enabled</div>
              <template x-for="model in filteredPdfModels()" :key="model.id">
                <button type="button"
                        @click="choose(model)"
                        class="flex w-full items-center justify-between gap-3 rounded-md px-3 py-2 text-left text-sm transition-colors hover:bg-gray-100"
                        :class="$store.app.model === model.id ? 'bg-gray-100 text-gray-950' : 'text-gray-700'">
                  <span class="truncate" x-text="model.id"></span>
                  <svg x-show="$store.app.model === model.id" class="h-4 w-4 shrink-0 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                  </svg>
                </button>
              </template>
            </div>
          </template>
          <template x-if="filteredNonPdfModels().length">
            <div>
              <div class="mt-1 border-t border-gray-100 px-3 pb-1 pt-3 text-[11px] font-semibold uppercase tracking-wide text-gray-400">No PDF input</div>
              <template x-for="model in filteredNonPdfModels()" :key="model.id">
                <button type="button"
                        @click="choose(model)"
                        class="flex w-full items-center justify-between gap-3 rounded-md px-3 py-2 text-left text-sm transition-colors hover:bg-gray-100"
                        :class="$store.app.model === model.id ? 'bg-gray-100 text-gray-950' : 'text-gray-700'">
                  <span class="truncate" x-text="model.id"></span>
                  <svg x-show="$store.app.model === model.id" class="h-4 w-4 shrink-0 text-gray-900" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                  </svg>
                </button>
              </template>
            </div>
          </template>
          <div x-show="!loading && !filteredModels().length" class="px-3 py-6 text-center text-sm text-gray-400">
            No models found.
          </div>
          <div x-show="error" class="px-3 py-2 text-sm text-amber-700" x-text="error"></div>
        </div>
      </div>
    </div>
  </div>
</header>
