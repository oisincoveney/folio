# Folio — Okteto dev manifest (generated by `momokaya-contract sync`).
#
# Cluster-sync inner loop only. No top-level `deploy:`/`destroy:` — those are
# Okteto Platform-only and the open-source CLI rejects them on `okteto up`. The
# ephemeral dev env is stood up/torn down by the mise dev:env / dev:down tasks
# (a declarative helm install; the chart owns its namespace + labels).
#
# Hand edits are overwritten: this is rendered from .momokaya/env.yaml
# `devComponents`. To change it, edit the contract and re-run `momokaya-contract sync`.

dev:
  folio:
    selector:
      app.kubernetes.io/component: folio
    container: folio
    image: ghcr.io/oisincoveney/folio:devbase
    workdir: /app
    command: reflex run --env dev --backend-host 0.0.0.0 --frontend-port 3000 --backend-port 8000
    sync:
      - .:/app
    environment:
      REFLEX_API_URL: https://folio-dev.momokaya.ee
      REFLEX_DEPLOY_URL: https://folio-dev.momokaya.ee
      MOMOKAYA_ENV_ID: ${MOMOKAYA_ENV_ID}
    persistentVolume:
      enabled: true
      size: 10Gi
    volumes:
      - /root/.cache/uv
