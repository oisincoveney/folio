[tools]
# helm 4.2.0 (fleet pin): helm 3.19's `--create-namespace` conflicts with a
# chart-rendered Namespace resource ("already exists"); helm 4 handles it.
"aqua:helm/helm" = "4.2.0"
kubectl = "1.33.9"
python = "3.14.3"
uv = "0.11.13"

# ─── Cluster-sync dev loop ───────────────────────────────────────────────
# `mise run dev` = install the Helm dev release into an ephemeral
# momokaya-dev-folio-$id namespace, then `okteto up folio` to attach the dev
# container and run `reflex run --env dev`. `dev:local` stays the no-cluster
# inner loop.
[tasks.dev]
description = "Start the cluster-sync dev loop (Helm dev release, then Okteto sync of folio)"
depends = ["_dev:env", "_dev:folio"]

[tasks."_dev:env"]
description = "Install the Helm dev release into the ephemeral momokaya-dev-folio namespace"
run = """
set -eu
context=$(kubectl config current-context 2>/dev/null || true)
if [ "$context" != "momokaya" ]; then
  echo "Refusing to deploy: current kube context is '${context:-<none>}', expected 'momokaya'." >&2
  echo "Use 'mise run dev:local' for the no-cluster inner loop, or switch context." >&2
  exit 1
fi
id="${MOMOKAYA_ENV_ID:?MOMOKAYA_ENV_ID is required}"
helm upgrade --install "folio-dev-$id" ./chart \
  -n "momokaya-dev-folio-$id" \
  --create-namespace \
  -f chart/values.yaml \
  -f chart/values.dev.yaml \
  --set-string "momokaya.envId=$id" \
  --wait
"""

[tasks."_dev:folio"]
description = "Attach Okteto to the folio dev container"
run = """
set -eu
id="${MOMOKAYA_ENV_ID:?MOMOKAYA_ENV_ID is required}"
okteto up folio -n "momokaya-dev-folio-$id"
"""

[tasks."dev:down"]
description = "Stop the dev loop and uninstall the ephemeral Helm release"
run = """
set -eu
id="${MOMOKAYA_ENV_ID:?MOMOKAYA_ENV_ID is required}"
okteto down folio -n "momokaya-dev-folio-$id" || true
helm uninstall "folio-dev-$id" -n "momokaya-dev-folio-$id" || true
"""

[tasks."dev:local"]
description = "Run Reflex directly on the host (requires DATABASE_URL + FOLIO_BUCKET_* set)"
run = "uv run reflex run"

[tasks.lint]
description = "Run ruff linter"
run = "uv run ruff check folio/"

[tasks.fix]
description = "Run ruff linter and apply fixes"
run = "uv run ruff check --fix folio/"

[tasks.typecheck]
description = "Run pyright type checker"
run = "uv run pyright folio/"

[tasks.test]
description = "Run pytest"
run = "uv run pytest"

[tasks.check]
description = "Run lint and typecheck together"
depends = ["lint", "typecheck"]

# ─── e2e ────────────────────────────────────────────────────────────────────
# `mise run e2e` = port-forward the production folio pod locally, run the
# Playwright suite against it, then tear down the port-forward.
# Requires kubectl context "momokaya" (the folio pod runs there).
# Set BASE_URL if you want to target a different host.
[tasks.e2e]
description = "Run Playwright e2e against the port-forwarded folio pod (kubectl context momokaya required)"
run = """
set -eu
context=$(kubectl config current-context 2>/dev/null || true)
if [ "$context" != "momokaya" ]; then
  echo "Refusing to run: current kube context is '${context:-<none>}', expected 'momokaya'." >&2
  exit 1
fi
# Start port-forward in background
kubectl port-forward -n folio deployment/folio 3001:3000 &
PF_PID=$!
trap 'kill $PF_PID 2>/dev/null || true' EXIT
# Wait for the port to open (up to 10 s)
for i in $(seq 1 20); do
  if curl -s --max-time 1 http://localhost:3001/ >/dev/null 2>&1; then
    break
  fi
  sleep 0.5
done
# Run the suite
cd e2e && npx playwright test --reporter=list
"""

[tasks."e2e:install"]
description = "Install Playwright + Chromium browser in e2e/"
run = "cd e2e && npm install && npx playwright install chromium"
