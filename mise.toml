[tools]
k3d = "5.8.3"
kubectl = "1.33.9"
python = "3.14.3"
tilt = "0.37.3"
uv = "0.11.13"

[tasks.dev]
description = "Run the Tilt local Kubernetes dev environment"
run = "KUBECONFIG=k8s/local/folio-local.kubeconfig tilt up --context k3d-folio-local"

[tasks."dev:ci"]
description = "Run Tilt once and exit when local Kubernetes workloads are healthy"
run = "KUBECONFIG=k8s/local/folio-local.kubeconfig tilt ci --context k3d-folio-local --timeout=8m --port=0"

[tasks."dev:local"]
description = "Run Reflex directly on the host (requires DATABASE_URL + FOLIO_BUCKET_* set)"
run = "uv run reflex run"

[tasks."k8s:create"]
description = "Create the local k3d cluster from declarative config"
run = "k3d cluster create --config k8s/local/k3d.yaml"

[tasks."k8s:kubeconfig"]
description = "Write the project-local kubeconfig for the local k3d cluster"
run = "k3d kubeconfig merge folio-local --output k8s/local/folio-local.kubeconfig --overwrite --kubeconfig-switch-context=false"

[tasks."k8s:delete"]
description = "Delete the local k3d cluster used by Tilt"
run = "k3d cluster delete folio-local"

[tasks."k8s:dry-run"]
description = "Validate Kubernetes manifests against the local cluster without applying changes"
run = "KUBECONFIG=k8s/local/folio-local.kubeconfig kubectl apply --dry-run=client -k k8s/overlays/local"

[tasks.lint]
description = "Run ruff linter"
run = "uv run ruff check folio/"

[tasks.fix]
description = "Run ruff linter and apply fixes"
run = "uv run ruff check --fix folio/"

[tasks.typecheck]
description = "Run pyright type checker"
run = "uv run pyright folio/"

[tasks.test]
description = "Run pytest"
run = "uv run pytest"

[tasks.check]
description = "Run lint and typecheck together"
depends = ["lint", "typecheck"]
