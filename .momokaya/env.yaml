repo: folio
displayName: Folio
workflowSurface: Folio
appSurface:
  - web
supportedEnvKinds:
  - dev
urlKinds:
  - web
attach:
  supportedEnvKinds:
    - dev
  command: mise run console:attach
diagnostics:
  status: mise run console:status
  logs: mise run console:logs
  doctor: mise run console:doctor
chart: chart
values:
  dev: chart/values.dev.yaml
urls:
  dev:
    web:
      name: web
      kind: web
      publicUrl: https://folio-dev.momokaya.ee/
      internalService: folio
      internalPort: 3000
# Dev-loop component — the source of truth the contract renders okteto.yml + the
# mise dev tasks from (INFRA-075). The folio component is a Reflex (Python) dev
# server on ports 3000 (frontend) + 8000 (backend). python runtime → the renderer
# enables the persistentVolume (folio bakes nothing at /app, so a PVC is safe and
# keeps the uv cache warm across restarts via /root/.cache/uv).
# No forward: folio is reached via the folio-dev ingress (in-cluster).
devComponents:
  - name: folio
    runtime: python
    image: ghcr.io/oisin-ee/folio:devbase
    workdir: /app
    command: reflex run --env dev --backend-host 0.0.0.0 --frontend-port 3000 --backend-port 8000
    sync:
      - .:/app
    env:
      # api_url: the public origin the *browser* uses to reach the reflex backend
      # (/_event websocket, /ping, /_upload). In split-port dev mode the backend
      # runs on :8000; the ingress routes those paths through to :8000.
      # Must be the public https origin so the browser WS connects via the ingress.
      REFLEX_API_URL: https://folio-dev.momokaya.ee
      # deploy_url: where the frontend is hosted (used by reflex for self-links).
      # Set explicitly so the rxconfig.py fallback (REFLEX_DEPLOY_URL → REFLEX_API_URL)
      # doesn't conflate the two now that REFLEX_API_URL carries the backend origin.
      REFLEX_DEPLOY_URL: https://folio-dev.momokaya.ee
      MOMOKAYA_ENV_ID: ${MOMOKAYA_ENV_ID}
    persistentVolume: true
