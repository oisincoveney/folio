# Folio dev-loop tasks — generated by `momokaya-contract sync`.
#
# Hand edits are overwritten: this is rendered from .momokaya/env.yaml `devComponents`.
# Include it from the repo's mise.toml so `mise run dev` inherits the canonical
# cluster-sync inner loop. To change it, edit the contract and re-run
# `momokaya-contract sync`.
#
# `mise run dev` = the cluster-sync inner loop in one command: deploy the
# ephemeral env once (_dev:env) then mirror every component (_dev:<comp>),
# hot-reloading. The component tasks depend on _dev:env (an EDGE, not a
# sibling) so the helm `--wait` install completes BEFORE any `okteto up` —
# otherwise the parallel deps race and okteto up hits a not-yet-ready stack.
#
# This is a mise INCLUDED task file (referenced from mise.toml `[task_config]
# includes`), so tasks are top-level tables ([dev], ["_dev:env"]) — NOT the
# [tasks.<name>] form used in mise.toml itself.

[dev]
description = "Start the folio cluster-sync dev environment (all components, hot-reload) — one command"
depends = ["_dev:folio"]

["_dev:env"]
hide = true
description = "Deploy the ephemeral folio dev environment (helm)"
run = """
set -eu
ctx="$(kubectl config current-context 2>/dev/null || true)"
[ "$ctx" = "momokaya" ] || { echo "kube context must be momokaya; got ${ctx:-none}" >&2; exit 2; }
id="${MOMOKAYA_ENV_ID:-okteto}"
ns="momokaya-dev-folio-$id"
# Okteto's OSS CLI can't run a deploy: section, so the stack install lives here
# — a plain declarative helm install (the chart owns its namespace + labels),
# separate from `okteto up` so the two never fight over replicas.
helm upgrade --install "folio-dev-$id" ./chart \\
  --namespace "$ns" --create-namespace \\
  --values chart/values.yaml --values chart/values.dev.yaml \\
  --set-string momokaya.envId="$id" --wait --timeout 15m
"""
["_dev:folio"]
hide = true
depends = ["_dev:env"]
description = "Okteto cluster-sync inner loop for the folio component"
run = """
set -eu
id="${MOMOKAYA_ENV_ID:-okteto}"
ns="momokaya-dev-folio-$id"
# Bounded re-attach loop (INFRA-075.07): a tailnet blip detaches okteto's
# port-forward and okteto 3.20 won't reconnect, killing live file-sync. Re-running
# `okteto up` re-attaches + re-syncs. NOT masking a race — by the time `okteto up`
# returns the channel is already dead; the short pause is backoff so we don't hammer
# a still-flapping tailnet on the next attach. The cap means a real config error
# (deterministic non-zero exit) still surfaces instead of looping forever.
okteto_attempt=1
okteto_max_attempts=10
while true; do
  if okteto up folio -n "$ns"; then
    break
  fi
  status=$?
  if [ "$okteto_attempt" -ge "$okteto_max_attempts" ]; then
    echo "okteto up folio failed $okteto_max_attempts times (last exit $status); giving up" >&2
    exit "$status"
  fi
  echo "okteto up folio detached (exit $status); re-attaching ($okteto_attempt/$okteto_max_attempts)" >&2
  okteto_attempt=$((okteto_attempt + 1))
  sleep 2
done
"""

["dev:down"]
description = "Stop the Okteto inner loops and tear down the folio dev environment"
run = """
set -eu
id="${MOMOKAYA_ENV_ID:-okteto}"
ns="momokaya-dev-folio-$id"
okteto down folio -n "$ns" || true
helm uninstall "folio-dev-$id" --namespace "$ns" || true
kubectl delete namespace "$ns" --wait=false || true
"""
