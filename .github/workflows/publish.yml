name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/oisin-ee/folio
  REFLEX_API_URL: https://folio.momokaya.ee

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build and push devbase image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: devbase
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:devbase
          cache-from: type=gha,scope=folio-devbase
          cache-to: type=gha,scope=folio-devbase,mode=max

      - name: Build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          build-args: |
            REFLEX_API_URL=${{ env.REFLEX_API_URL }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=folio-runtime
          cache-to: type=gha,scope=folio-runtime,mode=max
