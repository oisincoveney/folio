name: Publish Folio image

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/publish-image.yml"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "pyproject.toml"
      - "uv.lock"
      - "alembic/**"
      - "folio/**"
      - "rxconfig.py"
  workflow_dispatch:

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/oisincoveney/folio
  REFLEX_API_URL: https://folio.momokaya.ee

jobs:
  build-and-push:
    name: Build and push production image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          build-args: |
            REFLEX_API_URL=${{ env.REFLEX_API_URL }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Pin production manifest to image tag
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("k8s/overlays/prod/kustomization.yaml")
          text = path.read_text()
          text = re.sub(r"(?m)^(\s*newTag:\s*).*$", rf"\g<1>{os.environ['GITHUB_SHA']}", text, count=1)
          path.write_text(text)
          PY

      - name: Commit production image tag
        run: |
          if git diff --quiet -- k8s/overlays/prod/kustomization.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "Deploy Folio image ${GITHUB_SHA}"
          git push
