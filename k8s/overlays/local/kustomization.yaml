# Local-dev overlay used by Tilt against the k3d-folio-local cluster.
#
# Adds the local-only Secret with hardcoded development credentials. Never
# apply this against the momokaya cluster — the Tiltfile already guards
# `allow_k8s_contexts("k3d-folio-local")`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - secret.yaml
