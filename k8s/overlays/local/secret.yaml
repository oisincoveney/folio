apiVersion: v1
kind: Secret
metadata:
  name: folio-secrets
type: Opaque
stringData:
  # Local development credentials.
  POSTGRES_PASSWORD: local-postgres-password
  DATABASE_URL: postgresql://folio:local-postgres-password@postgres:5432/folio

  FOLIO_BUCKET_ACCESS_KEY: minioadmin
  FOLIO_BUCKET_SECRET_KEY: minioadmin
