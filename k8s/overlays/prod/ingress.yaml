# Public Ingress for folio.momokaya.ee.
#
# Reflex in fullstack prod mode serves the compiled frontend AND the backend
# API from a single uvicorn/granian process on port 3000 (see
# `run_backend_prod(mount_frontend_compiled_app=True)` in
# reflex/utils/exec.py). One Service port, one Ingress rule, no path routing.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: folio
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: folio.momokaya.ee
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: folio
                port:
                  number: 3000
  tls:
    - hosts:
        - folio.momokaya.ee
      secretName: folio-tls
