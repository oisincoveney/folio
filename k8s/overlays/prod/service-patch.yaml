# Base k8s/service.yaml routes `backend port 8000 -> targetPort 3000`, which
# sends backend traffic to the frontend port. In prod the Ingress needs to
# reach the Reflex backend (websocket on /_event, uploads on /_upload, etc.),
# so we fix the targetPort here.
apiVersion: v1
kind: Service
metadata:
  name: folio
spec:
  ports:
    - name: frontend
      port: 3000
      targetPort: 3000
    - name: backend
      port: 8000
      targetPort: 8000
