# Daily `pg_dump` of the folio Postgres into the same Minio bucket the app
# uses, under `_backups/postgres/`. The dump is in custom format
# (`--format=custom`) so it can be restored via `pg_restore` and supports
# parallel / selective restore.
#
# Why this exists: the data PVCs are now on the `longhorn-retain` storage
# class so a stray PVC delete won't lose the volume, but that doesn't protect
# against database-level corruption, a bad migration, or accidental DROP. A
# point-in-time dump in object storage is the second layer.
#
# Why same-bucket: folio runs a single Minio in-cluster; the dump going to
# the same bucket is co-located, not off-host. That's an explicit trade-off
# for v1 — when a real off-cluster backup target is provisioned, switch the
# `mc alias set` target.
#
# Retention is not enforced here; configure a Minio bucket-lifecycle rule on
# the `_backups/` prefix if you want time-based expiry.
#
# The base postgres image ships `pg_dump` but not `mc`; the CronJob downloads
# mc once per run. Adds ~3s to a sub-second backup of an empty DB; negligible
# for the actual workload size.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: "15 3 * * *" # 03:15 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:17
              envFrom:
                - configMapRef:
                    name: folio-config
                - secretRef:
                    name: folio-secrets
              command:
                - sh
                - -euc
                - |
                  apt-get update -qq
                  apt-get install -y -qq --no-install-recommends curl ca-certificates
                  curl -fsSL -o /usr/local/bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
                  chmod +x /usr/local/bin/mc

                  mc alias set local "$FOLIO_BUCKET_ENDPOINT" \
                    "$FOLIO_BUCKET_ACCESS_KEY" "$FOLIO_BUCKET_SECRET_KEY"

                  TS=$(date -u +%Y-%m-%dT%H-%M-%SZ)
                  KEY="_backups/postgres/folio-${TS}.dump"

                  pg_dump --dbname="$DATABASE_URL" \
                          --no-owner --no-privileges --format=custom \
                    | mc pipe "local/$FOLIO_BUCKET_NAME/$KEY"

                  echo "backup ok: $KEY"
