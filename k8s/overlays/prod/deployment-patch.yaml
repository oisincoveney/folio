# Prod overlay: switch from the locally-built `folio:latest` to the GHCR
# image, add the ghcr-pull-secret reference. Container port is unchanged from
# base (3000; Reflex prod serves frontend + backend from one process — see
# the ingress.yaml comment).
#
# Image tag is set via the kustomization.yaml `images:` directive — do not
# hard-code a tag here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: folio
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: db-migrate
          image: folio
          imagePullPolicy: IfNotPresent
      containers:
        - name: folio
          image: folio
          imagePullPolicy: IfNotPresent
