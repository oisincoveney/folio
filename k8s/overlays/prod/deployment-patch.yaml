# Prod overlay: attach the GHCR pull secret so the cluster can pull
# ghcr.io/oisincoveney/folio, and always pull the mutable production tag.
# The image itself (both the main container and the db-migrate init container)
# is rewritten by the `images:` directive in kustomization.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: folio
spec:
  template:
    spec:
      initContainers:
        - name: db-migrate
          imagePullPolicy: Always
      containers:
        - name: folio
          imagePullPolicy: Always
      imagePullSecrets:
        - name: ghcr-pull-secret
