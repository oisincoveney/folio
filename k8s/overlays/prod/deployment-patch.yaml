# Prod overlay: attach the GHCR pull secret so the cluster can pull
# ghcr.io/oisin-ee/folio. The image itself (both the main container and the
# db-migrate init container) is rewritten by the `images:` directive in
# kustomization.yaml — Kustomize matches by image name and substitutes every
# container that uses `folio` or `folio:latest`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: folio
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
