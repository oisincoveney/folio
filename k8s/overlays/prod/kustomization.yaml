# Production overlay for the momokaya cluster.
#
# Layered on top of the base manifests with:
#   - production image (ghcr.io/oisin-ee/folio) + pull secret
#   - Traefik Ingress + cert-manager TLS at folio.momokaya.ee
#   - prod configmap values (bucket name and in-cluster Minio endpoint)
#
# `folio-secrets` and `ghcr-pull-secret` are NOT included here; they live as
# SealedSecret manifests in oisin-ee/infra under
# k8s/manifests/folio/sealed-secrets/ and are synced into the folio namespace
# by a separate ArgoCD Application with sync-wave "-10".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: folio

resources:
  - ../../base
  - ingress.yaml
  - postgres-backup-cronjob.yaml

images:
  - name: folio
    newName: ghcr.io/oisin-ee/folio
    newTag: latest

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: folio
  - path: pvc-patches.yaml

# Merge prod values on top of the base configmap.
configMapGenerator:
  - name: folio-config
    behavior: merge
    literals:
      - FOLIO_BUCKET_NAME=folio-prod
      - FOLIO_BUCKET_ENDPOINT=http://minio.folio.svc.cluster.local:9000
      - FOLIO_BUCKET_REGION=us-east-1
