# Base manifests shared by every environment.
#
# This does NOT include a Secret — `folio-secrets` is required at runtime but
# its contents differ per environment. Each overlay supplies it: local commits
# plaintext under overlays/local/secret.yaml; prod pulls SealedSecret manifests
# from oisin-ee/infra via a separate ArgoCD app.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  # postgres/pvc.yaml, postgres/service.yaml, postgres/statefulset.yaml removed:
  # production DB migrated to CNPG Cluster `folio-db` (oisin-ee/infra
  # k8s/manifests/folio-db). The StatefulSet + Service are pruned by ArgoCD;
  # the Longhorn PVC (longhorn-retain SC) moves to Released state — data retained
  # for rollback. See INFRA-079.12.
  - minio/pvc.yaml
  - minio/service.yaml
  - minio/statefulset.yaml
  - deployment.yaml
  - service.yaml
