apiVersion: apps/v1
kind: Deployment
metadata:
  name: folio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: folio
  template:
    metadata:
      labels:
        app: folio
    spec:
      initContainers:
        # Wait for Postgres to be reachable, then apply alembic migrations.
        - name: db-migrate
          image: folio:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: folio-config
            - secretRef:
                name: folio-secrets
          command:
            - sh
            - -c
            - |
              set -e
              until uv run python -c "import psycopg2; psycopg2.connect('$DATABASE_URL')" > /dev/null 2>&1; do
                echo "waiting for postgres..."
                sleep 2
              done
              uv run reflex db migrate
      containers:
        - name: folio
          image: folio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: folio-config
            - secretRef:
                name: folio-secrets
          # Keep startup tolerant of first-import work and database dependency
          # checks. Production images may already contain the compiled Reflex
          # frontend, but readiness still depends on the app serving _health.
          startupProbe:
            httpGet:
              path: /_health
              port: 3000
            periodSeconds: 5
            failureThreshold: 120 # ~10 minutes
          readinessProbe:
            httpGet:
              path: /_health
              port: 3000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_health
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
