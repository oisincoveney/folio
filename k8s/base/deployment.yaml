apiVersion: apps/v1
kind: Deployment
metadata:
  name: folio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: folio
  template:
    metadata:
      labels:
        app: folio
    spec:
      initContainers:
        # Wait for Postgres to be reachable, then apply alembic migrations.
        - name: db-migrate
          image: folio:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: folio-config
            - secretRef:
                name: folio-secrets
          command:
            - sh
            - -c
            - |
              set -e
              until uv run python -c "import psycopg2; psycopg2.connect('$DATABASE_URL')" > /dev/null 2>&1; do
                echo "waiting for postgres..."
                sleep 2
              done
              uv run reflex db migrate
      containers:
        - name: folio
          image: folio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: folio-config
            - secretRef:
                name: folio-secrets
          # The image doesn't prebuild the Next.js frontend; `reflex run
          # --env prod` triggers a full `next build` at container startup that
          # can take a few minutes. Until startupProbe passes, readiness and
          # liveness are suspended.
          startupProbe:
            httpGet:
              path: /_health
              port: 3000
            periodSeconds: 5
            failureThreshold: 120 # ~10 minutes
          readinessProbe:
            httpGet:
              path: /_health
              port: 3000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_health
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
