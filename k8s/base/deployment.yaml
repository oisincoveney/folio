apiVersion: apps/v1
kind: Deployment
metadata:
  name: folio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: folio
  template:
    metadata:
      labels:
        app: folio
    spec:
      initContainers:
        # Wait for Postgres to be reachable, then apply alembic migrations.
        - name: db-migrate
          image: folio:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: folio-config
            - secretRef:
                name: folio-secrets
          command:
            - sh
            - -c
            - |
              set -e
              until uv run python -c "import psycopg2; psycopg2.connect('$DATABASE_URL')" > /dev/null 2>&1; do
                echo "waiting for postgres..."
                sleep 2
              done
              uv run reflex db migrate
      containers:
        - name: folio
          image: folio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: frontend
          envFrom:
            - configMapRef:
                name: folio-config
            - secretRef:
                name: folio-secrets
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
