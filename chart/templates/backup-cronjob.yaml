{{- if .Values.backup.enabled }}
# Daily `pg_dump` of the folio Postgres into the same Minio bucket the app
# uses, under `_backups/postgres/`. The dump is in custom format
# (`--format=custom`) so it can be restored via `pg_restore` and supports
# parallel / selective restore.
#
# Why this exists: the data PVCs are pinned to a retain-on-delete storage
# class so a stray PVC delete won't lose the volume, but that doesn't protect
# against database-level corruption, a bad migration, or accidental DROP. A
# point-in-time dump in object storage is the second layer.
#
# Why same-bucket: folio runs a single Minio in-cluster; the dump going to
# the same bucket is co-located, not off-host. That's an explicit trade-off
# for v1 — when a real off-cluster backup target is provisioned, switch the
# `mc alias set` target.
#
# Retention is not enforced here; configure a Minio bucket-lifecycle rule on
# the `_backups/` prefix if you want time-based expiry.
#
# The base postgres image ships `pg_dump` but not `mc`; the CronJob downloads
# mc once per run. Adds ~3s to a sub-second backup of an empty DB; negligible
# for the actual workload size.
#
# INFRA-100: `pg_dump | mc pipe` under `sh -euc` (no `pipefail`) let a pg_dump
# failure exit 0 -- `mc pipe` reads an empty stdin, uploads a valid-but-empty
# object, and the pipeline's exit status is `mc`'s (success), never
# `pg_dump`'s. That shipped 8 days of silent empty dumps logged as "backup
# ok" (2026-06-20 -> 06-28) before pg_dump started failing outright. Fixed by
# restructuring, not by adding `pipefail` alone: a streaming pipe can never be
# size-checked before it lands in the bucket, so the dump goes to a local
# tempfile FIRST, gets sized, and only a non-trivial dump is uploaded. Any
# failure (pg_dump, size check, upload) now exits non-zero -> the Job fails
# loud, `failedJobsHistoryLimit` keeps the evidence, and
# `FolioPostgresBackupJobFailed` (infra PrometheusRule) pages on it.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    {{- include "folio.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "folio.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: {{ .Values.backup.image | quote }}
              envFrom:
                - configMapRef:
                    name: {{ include "folio.configMapName" . }}
                - secretRef:
                    name: {{ include "folio.runtimeSecretName" . }}
                    optional: {{ .Values.secrets.optional }}
              command:
                - sh
                - -euo
                - pipefail
                - -c
                - |
                  apt-get update -qq
                  apt-get install -y -qq --no-install-recommends curl ca-certificates
                  curl -fsSL -o /usr/local/bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
                  chmod +x /usr/local/bin/mc

                  mc alias set local "$FOLIO_BUCKET_ENDPOINT" \
                    "$FOLIO_BUCKET_ACCESS_KEY" "$FOLIO_BUCKET_SECRET_KEY"

                  TS=$(date -u +%Y-%m-%dT%H-%M-%SZ)
                  KEY="_backups/postgres/folio-${TS}.dump"
                  DUMP_FILE="$(mktemp)"

                  # Dump to a local tempfile, NOT a pipe straight into `mc`: a
                  # streaming pipe uploads bytes as pg_dump produces them, so
                  # there is no point at which the object can be size-checked
                  # before it lands in the bucket. Landing it locally first
                  # makes the size check possible and keeps pg_dump's own exit
                  # status the one `set -e` sees (no pipeline exit-status
                  # ambiguity left to reintroduce).
                  pg_dump --dbname="$DATABASE_URL" \
                          --no-owner --no-privileges --format=custom \
                          --file="$DUMP_FILE"

                  DUMP_SIZE=$(wc -c < "$DUMP_FILE")
                  # 1KiB floor: a custom-format pg_dump of a truly empty
                  # schema still carries dump-header/TOC overhead of several
                  # hundred bytes, so anything under 1KiB means pg_dump wrote
                  # (at most) its header and nothing else -- exactly the
                  # failure mode that produced the 2026-06-20 -> 06-28 empty
                  # objects. A real dump (folio's smallest known-good backup:
                  # 15KiB) clears this by more than an order of magnitude.
                  MIN_DUMP_BYTES=1024
                  if [ "$DUMP_SIZE" -lt "$MIN_DUMP_BYTES" ]; then
                    echo "backup FAILED: dump is ${DUMP_SIZE} bytes (< ${MIN_DUMP_BYTES}), refusing to upload a near-empty dump" >&2
                    exit 1
                  fi

                  mc cp "$DUMP_FILE" "local/$FOLIO_BUCKET_NAME/$KEY"
                  rm -f "$DUMP_FILE"

                  echo "backup ok: $KEY (${DUMP_SIZE} bytes)"
{{- end }}
