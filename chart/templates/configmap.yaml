apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "folio.configMapName" . }}
  labels:
    {{- include "folio.labels" . | nindent 4 }}
data:
  # Non-sensitive runtime config. Bucket credentials + DATABASE_URL come from
  # the runtime Secret (secrets.existingSecret).
  POSTGRES_USER: {{ .Values.config.postgresUser | quote }}
  FOLIO_BUCKET_NAME: {{ .Values.config.bucketName | quote }}
  FOLIO_BUCKET_ENDPOINT: {{ .Values.config.bucketEndpoint | quote }}
  FOLIO_BUCKET_REGION: {{ .Values.config.bucketRegion | quote }}
