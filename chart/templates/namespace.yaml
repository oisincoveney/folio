{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace | quote }}
  labels:
    {{- include "folio.labels" . | nindent 4 }}
    {{- include "folio.momokayaLabels" . | nindent 4 }}
  # No annotations block: an annotated Namespace breaks `helm install
  # --create-namespace` (matches tova/rondo/jweb — labels only). The env-kind
  # label (in momokayaLabels) is what ESO's ghcr CES needs.
{{- end }}
