{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    {{- include "folio.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  selector:
    {{- include "folio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  labels:
    {{- include "folio.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.minio.storage | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  labels:
    {{- include "folio.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "folio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "folio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image | quote }}
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "folio.runtimeSecretName" . }}
                  key: FOLIO_BUCKET_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "folio.runtimeSecretName" . }}
                  key: FOLIO_BUCKET_SECRET_KEY
          volumeMounts:
            - name: minio-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
---
# One-shot bucket creation against the cluster-internal minio service.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  labels:
    {{- include "folio.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  template:
    metadata:
      labels:
        {{- include "folio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: {{ .Values.minio.mcImage | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "folio.fullname" . }}
            - secretRef:
                name: {{ include "folio.runtimeSecretName" . }}
          command:
            - sh
            - -c
            - |
              set -e
              until mc alias set local "$FOLIO_BUCKET_ENDPOINT" "$FOLIO_BUCKET_ACCESS_KEY" "$FOLIO_BUCKET_SECRET_KEY" > /dev/null 2>&1; do
                sleep 1
              done
              mc mb --ignore-existing local/"$FOLIO_BUCKET_NAME"
{{- end }}
