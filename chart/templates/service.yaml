apiVersion: v1
kind: Service
metadata:
  name: {{ include "folio.fullname" . }}
  labels:
    {{- include "folio.labels" . | nindent 4 }}
    app.kubernetes.io/component: folio
spec:
  type: ClusterIP
  ports:
    # Reflex in fullstack mode serves the frontend static export and the
    # backend from a single process on 3000; the Service only exposes 3000.
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "folio.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: folio
