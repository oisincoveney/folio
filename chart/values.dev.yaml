# Ephemeral Okteto dev environment overrides (momokaya-dev-folio-$id).
#
# The dev container is replaced by Okteto with `reflex run --env dev` (see
# okteto.yml). The runtime Secret `folio` (DATABASE_URL, POSTGRES_PASSWORD,
# FOLIO_BUCKET_*) is materialized into the namespace by Momokaya infra/ESO; it
# is never stored in Helm values.

namespace:
  create: true

# Okteto owns .spec.replicas in dev (it scales the synced Deployment). Null
# makes the chart omit the field so helm-4 SSA doesn't fight okteto on re-run.
replicaCount: null

image:
  pullPolicy: Always

# ghcr.io/oisincoveney/folio is private; pull with the ESO-reflected secret.
imagePullSecrets:
  - name: ghcr-pull-secret

secrets:
  existingSecret: folio-secrets

# Per-run in-cluster Postgres + MinIO back the dev environment.
postgres:
  enabled: true

minio:
  enabled: true

momokaya:
  repo: folio
  envKind: dev
  urls:
    web:
      host: folio-dev.momokaya.ee
      path: /
      service: folio
      port: 3000
      kind: web
      internalService: folio
      internalPort: 3000
      readiness: ready
      exposure: authenticated
