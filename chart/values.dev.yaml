# Ephemeral Okteto dev environment overrides (momokaya-dev-folio-$id).
#
# The dev container is replaced by Okteto with `reflex run --env dev` (see
# okteto.yml). The runtime Secret `folio` (DATABASE_URL, POSTGRES_PASSWORD,
# FOLIO_BUCKET_*) is materialized into the namespace by Momokaya infra/ESO; it
# is never stored in Helm values.

namespace:
  create: true

# Okteto owns .spec.replicas in dev (it scales the synced Deployment). Null
# makes the chart omit the field so helm-4 SSA doesn't fight okteto on re-run.
replicaCount: null

image:
  pullPolicy: Always

# ghcr.io/oisin-ee/folio is private; pull with the ESO-reflected secret.
imagePullSecrets:
  - name: ghcr-pull-secret

secrets:
  existingSecret: folio-secrets

# Per-run in-cluster Postgres + MinIO back the dev environment.
postgres:
  enabled: true

minio:
  enabled: true

service:
  # Reflex split-port dev mode: frontend on 3000, backend (socket.io/ping/upload)
  # on 8000. The ingress routes /_event, /ping, /_upload to this port.
  backendPort: 8000

momokaya:
  repo: folio
  envKind: dev
  # Dual-exposure permanence (INFRA-074): folio-dev.momokaya.ee is now served by
  # the platform-auth oauth2-proxy (infra k8s/apps/system/
  # protected-operator-hosts.yaml, row folio-dev) which owns the public TLS host
  # + verify-bot SSO and split-port-routes /_event /ping /_upload -> backend :8000
  # and / -> frontend :3000 through to this env's `folio-dev-okteto` Service.
  # `momokaya.urls.web` is the ONLY consumer of the chart's public ingress range
  # (chart/templates/ingress.yaml) — it is the `exposure: authenticated` host. The
  # chart ingress would render a SECOND IngressRoute for the same host (traefik
  # then routes folio-dev unpredictably, breaking the socket.io WS), so the host
  # entry is removed: the range skips when no url has a host, rendering zero chart
  # ingresses. The env is reachable only through the auth proxy. `ingress.enabled`
  # is already false in the base values and never produced this host's ingress.
  urls: {}
