[project]
name = "folio"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.14"
dependencies = [
    "babel>=2.18.0",
    "cleanco>=2.3",
    "dateparser>=1.4.0",
    "flask>=3.1.3",
    "ftfy>=6.3.1",
    "polars>=1.40.1",
    "price-parser>=0.5.1",
    "pycountry>=26.2.16",
    "pydantic>=2.13.4",
    "python-slugify>=8.0.4",
    "rapidfuzz>=3.14.5",
    "titlecase>=2.4.1",
]

[dependency-groups]
dev = [
    "pytest>=9.0.1",
    "ruff>=0.15.13",
]

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",      # docstrings — not required
    "ANN",    # type annotations — not enforced
    "COM812", # trailing comma — conflicts with formatter
    "ISC001", # implicit string concat — conflicts with formatter
]

[tool.ruff.lint.per-file-ignores]
"*.py" = ["T201"]  # allow print()
